<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bio Duel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #080810;
    --card-bg: #12121E;
    --card-border: #1E1E2E;
    --gold: #FFD700;
    --gold-dim: rgba(255, 215, 0, 0.15);
    --gold-glow: 0 0 30px rgba(255, 215, 0, 0.4), 0 0 60px rgba(255, 215, 0, 0.15);
    --silver-glow: 0 0 30px rgba(180,180,200,0.4), 0 0 60px rgba(180,180,200,0.15);
    --text: #ffffff;
    --text-muted: rgba(255,255,255,0.45);
    --font-serif: 'Playfair Display', Georgia, serif;
    --font-sans: 'DM Sans', -apple-system, sans-serif;
    --spring: cubic-bezier(0.2, 0.8, 0.2, 1);
    --ease-out: cubic-bezier(0.0, 0.0, 0.2, 1);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-sans);
    overflow: hidden;
  }

  /* Radial glow at center */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 70% 55% at 50% 52%, rgba(60, 40, 140, 0.18) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* Subtle noise texture */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    opacity: 0.4;
    pointer-events: none;
    z-index: 0;
  }

  #app {
    position: relative;
    z-index: 1;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 28px 0;
    flex-shrink: 0;
  }

  .back-link {
    font-family: var(--font-sans);
    font-size: 14px;
    font-weight: 500;
    color: var(--text-muted);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: color 0.2s;
    letter-spacing: 0.01em;
  }
  .back-link:hover { color: var(--text); }
  .back-link::before {
    content: '←';
    font-size: 16px;
  }

  .counter {
    font-family: var(--font-sans);
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .counter span {
    color: var(--gold);
    font-weight: 600;
  }

  /* ── PERSON HEADER ── */
  .person-header {
    text-align: center;
    padding: 18px 24px 0;
    flex-shrink: 0;
  }
  .person-name {
    font-family: var(--font-sans);
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.01em;
  }
  .person-meta {
    font-family: var(--font-sans);
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 3px;
  }
  .person-divider {
    margin: 14px auto 0;
    width: 180px;
    height: 1px;
    background: linear-gradient(to right, transparent, rgba(255,255,255,0.1), transparent);
  }

  /* ── ARENA ── */
  .arena {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px 20px;
    gap: 0;
    min-height: 0;
    position: relative;
  }

  /* ── CARDS ── */
  .card-wrapper {
    flex: 1;
    max-width: 380px;
    display: flex;
    align-items: stretch;
    justify-content: center;
  }

  .card {
    width: 100%;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 18px;
    padding: 24px 22px;
    cursor: grab;
    user-select: none;
    position: relative;
    display: flex;
    flex-direction: column;
    gap: 16px;
    transition: transform 0.35s var(--spring), box-shadow 0.35s ease, opacity 0.35s ease, filter 0.35s ease, border-color 0.35s ease;
    will-change: transform;
    /* inner subtle gradient */
    background-image: linear-gradient(160deg, rgba(255,255,255,0.025) 0%, transparent 60%);
    min-height: 220px;
    max-height: 380px;
    overflow: hidden;
  }

  .card:active { cursor: grabbing; }

  .card-a { transform: rotate(2deg); }
  .card-b { transform: rotate(-2deg); }

  /* Drag hint shimmer on cards */
  .card::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 18px;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.04) 50%, transparent 100%);
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }

  .card-bio-pill {
    display: inline-flex;
    align-items: center;
    padding: 4px 12px;
    background: rgba(255,255,255,0.07);
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    width: fit-content;
    font-family: var(--font-sans);
  }

  .card-bio-text {
    font-family: var(--font-serif);
    font-size: clamp(15px, 2vw, 18px);
    font-weight: 700;
    line-height: 1.55;
    color: var(--text);
    flex: 1;
  }

  .drag-hint {
    font-family: var(--font-sans);
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.04em;
    display: flex;
    align-items: center;
    gap: 5px;
    margin-top: auto;
    opacity: 0.7;
  }

  /* champion badge */
  .champion-badge {
    position: absolute;
    top: -12px;
    left: 50%;
    transform: translateX(-50%) scale(0);
    background: var(--gold);
    color: #080810;
    font-family: var(--font-sans);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 5px 14px;
    border-radius: 20px;
    white-space: nowrap;
    transition: transform 0.4s var(--spring);
    z-index: 10;
  }

  .card.is-champion .champion-badge {
    transform: translateX(-50%) scale(1);
  }

  /* ── VS BADGE ── */
  .vs-container {
    flex-shrink: 0;
    width: 88px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    position: relative;
    z-index: 2;
  }

  .vs-badge {
    font-family: var(--font-serif);
    font-size: clamp(28px, 4vw, 40px);
    font-weight: 900;
    color: var(--gold);
    text-shadow: 0 0 20px rgba(255,215,0,0.6), 0 0 40px rgba(255,215,0,0.25);
    letter-spacing: -0.01em;
    transition: all 0.4s var(--spring);
    text-align: center;
    line-height: 1;
  }

  .vs-result {
    font-family: var(--font-sans);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gold);
    text-align: center;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 0.3s, transform 0.3s;
    height: 14px;
  }

  .vs-result.visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* ── ACTIONS ── */
  .actions {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 12px 24px 28px;
  }

  .action-btn {
    font-family: var(--font-sans);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.04em;
    border: none;
    cursor: pointer;
    border-radius: 50px;
    transition: all 0.2s var(--spring);
    padding: 11px 22px;
    display: flex;
    align-items: center;
    gap: 7px;
    white-space: nowrap;
  }

  .btn-champion-a {
    background: rgba(255,215,0,0.1);
    color: var(--gold);
    border: 1px solid rgba(255,215,0,0.25);
  }
  .btn-champion-a:hover {
    background: rgba(255,215,0,0.18);
    border-color: rgba(255,215,0,0.5);
    transform: translateY(-1px);
  }

  .btn-tie {
    background: rgba(255,255,255,0.05);
    color: var(--text-muted);
    border: 1px solid rgba(255,255,255,0.1);
    font-size: 12px;
    padding: 11px 16px;
  }
  .btn-tie:hover {
    background: rgba(255,255,255,0.09);
    color: var(--text);
    transform: translateY(-1px);
  }

  .btn-champion-b {
    background: rgba(255,215,0,0.1);
    color: var(--gold);
    border: 1px solid rgba(255,215,0,0.25);
  }
  .btn-champion-b:hover {
    background: rgba(255,215,0,0.18);
    border-color: rgba(255,215,0,0.5);
    transform: translateY(-1px);
  }

  .action-btn:active { transform: scale(0.96) translateY(0); }
  .action-btn:disabled { opacity: 0.3; pointer-events: none; }

  /* keyboard hint */
  .kbd-hint {
    font-family: var(--font-sans);
    font-size: 11px;
    color: rgba(255,255,255,0.2);
    text-align: center;
    padding: 0 24px 16px;
    flex-shrink: 0;
    letter-spacing: 0.02em;
  }
  .kbd-hint kbd {
    font-family: var(--font-sans);
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 10px;
  }

  /* ── PROGRESS INDICATOR ── */
  .progress-bar-wrap {
    padding: 14px 28px 0;
    flex-shrink: 0;
  }
  .progress-track {
    width: 100%;
    height: 2px;
    background: rgba(255,255,255,0.07);
    border-radius: 2px;
    overflow: visible;
    position: relative;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(to right, rgba(255,215,0,0.4), var(--gold));
    border-radius: 2px;
    transition: width 0.5s var(--spring);
    position: relative;
  }
  .progress-fill::after {
    content: '';
    position: absolute;
    right: -1px;
    top: -3px;
    width: 8px;
    height: 8px;
    background: var(--gold);
    border-radius: 50%;
    box-shadow: 0 0 8px rgba(255,215,0,0.6);
  }
  .progress-label {
    font-family: var(--font-sans);
    font-size: 11px;
    color: var(--text-muted);
    text-align: center;
    margin-top: 8px;
    letter-spacing: 0.04em;
  }

  /* ── STATES ── */
  .card.is-champion {
    border-color: var(--gold);
    box-shadow: var(--gold-glow);
    transform: rotate(0deg) scale(1.04) !important;
    z-index: 2;
  }

  .card.is-loser {
    transform: rotate(0deg) scale(0.88) !important;
    opacity: 0.22;
    filter: blur(1.5px);
    border-color: transparent;
  }

  .card.is-tie {
    border-color: rgba(180,180,200,0.5);
    box-shadow: var(--silver-glow);
    transform: rotate(0deg) scale(1.01) !important;
  }

  /* exit/enter animation classes */
  .card.exiting {
    transform: scale(0.7) translateY(20px) !important;
    opacity: 0 !important;
    transition: transform 0.4s var(--ease-out), opacity 0.4s var(--ease-out) !important;
  }

  .vs-badge.exiting {
    transform: scale(0.5);
    opacity: 0;
    transition: transform 0.3s var(--ease-out), opacity 0.3s ease !important;
  }

  .card.entering-left {
    animation: enterLeft 0.55s var(--spring) forwards;
  }
  .card.entering-right {
    animation: enterRight 0.55s var(--spring) forwards;
  }

  @keyframes enterLeft {
    from { transform: translateX(-80px) rotate(6deg) scale(0.85); opacity: 0; }
    to   { transform: rotate(2deg) scale(1); opacity: 1; }
  }
  @keyframes enterRight {
    from { transform: translateX(80px) rotate(-6deg) scale(0.85); opacity: 0; }
    to   { transform: rotate(-2deg) scale(1); opacity: 1; }
  }

  .vs-badge.entering {
    animation: vsEnter 0.6s var(--spring) forwards;
  }
  @keyframes vsEnter {
    from { transform: scale(0.3) rotate(-10deg); opacity: 0; }
    to   { transform: scale(1) rotate(0deg); opacity: 1; }
  }

  /* ── COMPLETE SCREEN ── */
  #complete-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    text-align: center;
    padding: 40px;
    animation: fadeIn 0.6s ease forwards;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .complete-trophy {
    font-size: 64px;
    margin-bottom: 28px;
    filter: drop-shadow(0 0 20px rgba(255,215,0,0.5));
    animation: floatTrophy 3s ease-in-out infinite;
  }
  @keyframes floatTrophy {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  .complete-title {
    font-family: var(--font-serif);
    font-size: clamp(28px, 5vw, 42px);
    font-weight: 900;
    color: var(--gold);
    text-shadow: 0 0 30px rgba(255,215,0,0.4);
    margin-bottom: 12px;
  }

  .complete-sub {
    font-family: var(--font-sans);
    font-size: 15px;
    color: var(--text-muted);
    margin-bottom: 36px;
    line-height: 1.6;
  }
  .complete-sub strong {
    color: var(--text);
  }

  .complete-restart {
    font-family: var(--font-sans);
    font-size: 14px;
    font-weight: 600;
    background: var(--gold);
    color: #080810;
    border: none;
    border-radius: 50px;
    padding: 13px 32px;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: all 0.2s var(--spring);
  }
  .complete-restart:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(255,215,0,0.3);
  }

  /* ── MOBILE ── */
  @media (max-width: 640px) {
    .arena {
      flex-direction: column;
      padding: 10px 16px;
      gap: 0;
      align-items: center;
    }

    .card-wrapper {
      max-width: 100%;
      width: 100%;
    }

    .card {
      min-height: 160px;
      max-height: 230px;
      padding: 18px 18px;
    }

    .card-bio-text {
      font-size: 14px;
    }

    .vs-container {
      width: auto;
      flex-direction: row;
      gap: 12px;
      padding: 6px 0;
    }

    .vs-badge {
      font-size: 24px;
    }

    .vs-result {
      font-size: 9px;
    }

    .card-a { transform: rotate(1deg); }
    .card-b { transform: rotate(-1deg); }

    @keyframes enterLeft {
      from { transform: translateY(-50px) rotate(3deg) scale(0.85); opacity: 0; }
      to   { transform: rotate(1deg) scale(1); opacity: 1; }
    }
    @keyframes enterRight {
      from { transform: translateY(50px) rotate(-3deg) scale(0.85); opacity: 0; }
      to   { transform: rotate(-1deg) scale(1); opacity: 1; }
    }

    .actions {
      gap: 8px;
      padding: 10px 16px 20px;
    }

    .action-btn {
      font-size: 12px;
      padding: 10px 14px;
    }

    .kbd-hint { display: none; }
  }
</style>
</head>
<body>
<div id="app">
  <!-- Header -->
  <div class="header">
    <a href="#" class="back-link" id="back-link">back</a>
    <div class="counter"><span id="labeled-count">0</span> labeled</div>
  </div>

  <!-- Progress -->
  <div class="progress-bar-wrap">
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
    </div>
    <div class="progress-label" id="progress-label">Pair 1 of 5</div>
  </div>

  <!-- Person header -->
  <div class="person-header" id="person-header">
    <div class="person-name" id="person-name"></div>
    <div class="person-meta" id="person-meta"></div>
    <div class="person-divider"></div>
  </div>

  <!-- Arena -->
  <div class="arena" id="arena">
    <div class="card-wrapper" id="wrapper-a">
      <div class="card card-a" id="card-a">
        <div class="champion-badge">Champion ✓</div>
        <div class="card-bio-pill">Bio A</div>
        <div class="card-bio-text" id="bio-a-text"></div>
        <div class="drag-hint" id="drag-hint-a">drag → to champion</div>
      </div>
    </div>

    <div class="vs-container">
      <div class="vs-badge" id="vs-badge">VS</div>
      <div class="vs-result" id="vs-result"></div>
    </div>

    <div class="card-wrapper" id="wrapper-b">
      <div class="card card-b" id="card-b">
        <div class="champion-badge">Champion ✓</div>
        <div class="card-bio-pill">Bio B</div>
        <div class="card-bio-text" id="bio-b-text"></div>
        <div class="drag-hint" id="drag-hint-b">← drag to champion</div>
      </div>
    </div>
  </div>

  <!-- Actions -->
  <div class="actions">
    <button class="action-btn btn-champion-a" id="btn-a">← Champion A</button>
    <button class="action-btn btn-tie" id="btn-tie">Tie</button>
    <button class="action-btn btn-champion-b" id="btn-b">Champion B →</button>
  </div>

  <!-- Keyboard hint -->
  <div class="kbd-hint">
    <kbd>1</kbd> or <kbd>←</kbd> Champion A &nbsp;·&nbsp;
    <kbd>=</kbd> Tie &nbsp;·&nbsp;
    <kbd>2</kbd> or <kbd>→</kbd> Champion B
  </div>

  <!-- Complete screen -->
  <div id="complete-screen">
    <div class="complete-trophy">🏆</div>
    <div class="complete-title">Tournament Complete</div>
    <div class="complete-sub" id="complete-sub"></div>
    <button class="complete-restart" id="complete-restart">Run Again</button>
  </div>
</div>

<script>
const PAIRS = [
  {
    person: { name: 'Jordan M.', age: 26, job: 'Software Engineer', city: 'NYC' },
    a: 'I love hiking and cooking Italian food. I work in tech and spend my weekends exploring the city. Big music fan always looking for concert buddies. Looking for someone genuine who wants to build something real.',
    b: "I write code that works on my machine (usually). I make pasta from scratch on Sundays because it's the only thing slower than my test suite. If your idea of a perfect night involves arguing whether Die Hard is a Christmas movie — we're going to get along great."
  },
  {
    person: { name: 'Casey L.', age: 24, job: 'Kindergarten Teacher', city: 'Brooklyn' },
    a: "I spend my days teaching 5-year-olds that sharing is caring, then immediately fail to share my fries. 47 plants, zero regrets. Currently on a Russian lit kick — which explains the vague existential expression.",
    b: 'Elementary teacher who loves reading and plants. I do yoga on weekends and love exploring coffee shops around Brooklyn. Looking for someone kind and adventurous to spend time with.'
  },
  {
    person: { name: 'Avery K.', age: 28, job: 'UX Designer', city: 'Manhattan' },
    a: "I collect passport stamps and climbing calluses with equal enthusiasm. Shoot film because I like the commitment — you can't swipe left on a photo you've already taken. Currently planning my 4th trip to Japan. Yes, I have a problem.",
    b: 'Love traveling and trying new foods. I design apps for work and enjoy rock climbing on weekends. Film photography is my creative outlet. Looking for someone to explore the city with.'
  },
  {
    person: { name: 'Sam R.', age: 30, job: 'Chef', city: 'Lower East Side' },
    a: "Professional chef who eats cereal for dinner at home. I spend 60 hours a week making food look beautiful and then can't be bothered. If you're a natural disaster in the kitchen too, we'll get along. My sourdough starter is named Gerald and he's doing great.",
    b: "I'm a chef who loves trying new restaurants and cuisines. Passionate about food and sustainability. Looking for someone who appreciates good conversation and great meals."
  },
  {
    person: { name: 'Morgan P.', age: 27, job: 'Journalist', city: 'Midtown' },
    a: "I write about things I barely understand, which is apparently journalism. Amateur competitive Scrabble player (yes, really). My book-to-read pile has achieved structural integrity at this point. Looking for someone who won't judge my annotated paperbacks.",
    b: 'Journalist passionate about storytelling. I love reading, board games, and good coffee. Looking for someone curious and kind who enjoys exploring the city and talking about ideas.'
  }
];

// ── State ──
let currentIndex = 0;
let labeledCount = 0;
let judging = false; // lock during animation

// ── DOM refs ──
const cardA       = document.getElementById('card-a');
const cardB       = document.getElementById('card-b');
const vsBadge     = document.getElementById('vs-badge');
const vsResult    = document.getElementById('vs-result');
const bioAText    = document.getElementById('bio-a-text');
const bioBText    = document.getElementById('bio-b-text');
const personName  = document.getElementById('person-name');
const personMeta  = document.getElementById('person-meta');
const labeledEl   = document.getElementById('labeled-count');
const progressFill= document.getElementById('progress-fill');
const progressLbl = document.getElementById('progress-label');
const btnA        = document.getElementById('btn-a');
const btnB        = document.getElementById('btn-b');
const btnTie      = document.getElementById('btn-tie');
const arena       = document.getElementById('arena');
const completeScreen = document.getElementById('complete-screen');
const completeSub = document.getElementById('complete-sub');
const completeRestart = document.getElementById('complete-restart');
const dragHintA   = document.getElementById('drag-hint-a');
const dragHintB   = document.getElementById('drag-hint-b');

function loadPair(idx, isFirst = false) {
  const pair = PAIRS[idx];
  personName.textContent = pair.person.name;
  personMeta.textContent = `${pair.person.age} · ${pair.person.job} · ${pair.person.city}`;
  bioAText.textContent = pair.a;
  bioBText.textContent = pair.b;

  // Reset card states
  cardA.className = 'card card-a';
  cardB.className = 'card card-b';
  cardA.style.cssText = '';
  cardB.style.cssText = '';
  vsBadge.className = 'vs-badge';
  vsBadge.textContent = 'VS';
  vsResult.className = 'vs-result';
  vsResult.textContent = '';

  // Update progress
  progressFill.style.width = `${(idx / PAIRS.length) * 100}%`;
  progressLbl.textContent = `Pair ${idx + 1} of ${PAIRS.length}`;
  labeledEl.textContent = labeledCount;

  if (!isFirst) {
    // Entrance animations
    cardA.classList.add('entering-left');
    cardB.classList.add('entering-right');
    vsBadge.classList.add('entering');

    // Clean up animation classes after they finish
    setTimeout(() => {
      cardA.classList.remove('entering-left');
      cardB.classList.remove('entering-right');
      vsBadge.classList.remove('entering');
    }, 600);
  }

  judging = false;
  setButtonsDisabled(false);
}

function setButtonsDisabled(disabled) {
  btnA.disabled = disabled;
  btnB.disabled = disabled;
  btnTie.disabled = disabled;
}

function champion(winner) {
  if (judging) return;
  judging = true;
  setButtonsDisabled(true);

  const winCard  = winner === 'a' ? cardA : cardB;
  const loseCard = winner === 'a' ? cardB : cardA;
  const label    = winner === 'a' ? 'Bio A Wins' : 'Bio B Wins';

  // Apply winner/loser states
  winCard.classList.add('is-champion');
  loseCard.classList.add('is-loser');

  // VS badge result
  vsResult.textContent = label;
  vsResult.classList.add('visible');

  labeledCount++;
  labeledEl.textContent = labeledCount;

  // Proceed after pause
  setTimeout(() => advance(), 900);
}

function tie() {
  if (judging) return;
  judging = true;
  setButtonsDisabled(true);

  cardA.classList.add('is-tie');
  cardB.classList.add('is-tie');
  vsResult.textContent = 'Tie';
  vsResult.classList.add('visible');

  labeledCount++;
  labeledEl.textContent = labeledCount;

  setTimeout(() => advance(), 900);
}

function advance() {
  // Exit animations
  cardA.classList.add('exiting');
  cardB.classList.add('exiting');
  vsBadge.classList.add('exiting');

  setTimeout(() => {
    currentIndex++;
    if (currentIndex >= PAIRS.length) {
      showComplete();
    } else {
      loadPair(currentIndex);
    }
  }, 420);
}

function showComplete() {
  arena.style.display = 'none';
  document.querySelector('.person-header').style.display = 'none';
  document.querySelector('.actions').style.display = 'none';
  document.querySelector('.kbd-hint').style.display = 'none';
  document.querySelector('.progress-bar-wrap').style.display = 'none';

  completeSub.innerHTML = `<strong>${labeledCount} preference${labeledCount !== 1 ? 's' : ''}</strong> recorded across ${PAIRS.length} bios.<br>Data is ready for training.`;
  completeScreen.style.display = 'flex';

  progressFill.style.width = '100%';
}

completeRestart.addEventListener('click', () => {
  currentIndex = 0;
  labeledCount = 0;

  completeScreen.style.display = 'none';
  arena.style.display = '';
  document.querySelector('.person-header').style.display = '';
  document.querySelector('.actions').style.display = '';
  document.querySelector('.kbd-hint').style.display = '';
  document.querySelector('.progress-bar-wrap').style.display = '';

  loadPair(0, false);
});

// ── Button actions ──
btnA.addEventListener('click', () => champion('a'));
btnB.addEventListener('click', () => champion('b'));
btnTie.addEventListener('click', () => tie());

// ── Keyboard ──
document.addEventListener('keydown', (e) => {
  if (judging) return;
  if (e.key === '1' || e.key === 'ArrowLeft')  champion('a');
  if (e.key === '2' || e.key === 'ArrowRight') champion('b');
  if (e.key === '=') tie();
});

// ── Drag ──
function setupCardDrag(cardEl, direction, onChampion) {
  let startX = 0;
  let dragging = false;
  const THRESHOLD = 60;
  const baseRotate = direction === 'right' ? 2 : -2;

  function start(x) {
    if (judging) return;
    startX = x;
    dragging = true;
    cardEl.style.transition = 'none';
    cardEl.style.cursor = 'grabbing';
  }

  function move(x) {
    if (!dragging || judging) return;
    const dx = x - startX;
    const championing = direction === 'right' ? dx > 0 : dx < 0;
    const raw = Math.abs(dx);
    const intensity = Math.min(raw / THRESHOLD, 1);

    if (championing) {
      const scale = 1 + intensity * 0.05;
      const rotate = baseRotate * (1 - intensity);
      const glow = intensity > 0.3
        ? `0 0 ${20 * intensity}px rgba(255,215,0,${0.3 * intensity}), 0 0 ${40 * intensity}px rgba(255,215,0,${0.1 * intensity})`
        : 'none';
      cardEl.style.transform = `rotate(${rotate}deg) scale(${scale}) translateX(${dx * 0.35}px)`;
      cardEl.style.boxShadow = glow;
      cardEl.style.borderColor = intensity > 0.3 ? `rgba(255,215,0,${intensity * 0.7})` : '';
    } else {
      cardEl.style.transform = `rotate(${baseRotate}deg)`;
      cardEl.style.boxShadow = '';
      cardEl.style.borderColor = '';
    }
  }

  function end(x) {
    if (!dragging) return;
    dragging = false;
    cardEl.style.cursor = 'grab';

    const dx = x - startX;
    const shouldChampion = direction === 'right' ? dx > THRESHOLD : dx < -THRESHOLD;

    if (shouldChampion && !judging) {
      cardEl.style.transition = '';
      cardEl.style.boxShadow = '';
      cardEl.style.borderColor = '';
      onChampion();
    } else {
      cardEl.style.transition = 'transform 0.4s cubic-bezier(0.2,0.8,0.2,1), box-shadow 0.3s ease, border-color 0.3s ease';
      cardEl.style.transform = `rotate(${baseRotate}deg)`;
      cardEl.style.boxShadow = '';
      cardEl.style.borderColor = '';
    }
  }

  // Mouse
  cardEl.addEventListener('mousedown', (e) => {
    e.preventDefault();
    start(e.clientX);
  });
  document.addEventListener('mousemove', (e) => move(e.clientX));
  document.addEventListener('mouseup', (e) => end(e.clientX));

  // Touch
  cardEl.addEventListener('touchstart', (e) => {
    start(e.touches[0].clientX);
  }, { passive: true });
  document.addEventListener('touchmove', (e) => {
    if (dragging) move(e.touches[0].clientX);
  }, { passive: true });
  document.addEventListener('touchend', (e) => {
    end(e.changedTouches[0].clientX);
  });

  // Tap to champion (short drag or click)
  cardEl.addEventListener('click', (e) => {
    if (judging) return;
    const dx = Math.abs(e.clientX - startX);
    if (dx < 5) onChampion();
  });
}

setupCardDrag(cardA, 'right', () => champion('a'));
setupCardDrag(cardB, 'left',  () => champion('b'));

// ── Init ──
loadPair(0, true);
</script>
