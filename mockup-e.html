<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Bio Preference Collector</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0F0F12;
    --prefer-color: rgba(40, 200, 80, 0.65);
    --skip-color: rgba(200, 40, 60, 0.55);
    --card-radius: 24px;
    --spring: cubic-bezier(0.2, 0.8, 0.2, 1);
    --spring-back: cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    color: white;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }

  /* Background noise texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  /* ── Layout ── */
  .app {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    z-index: 1;
  }

  /* ── Top bar ── */
  .top-bar {
    width: 100%;
    max-width: 480px;
    padding: 16px 20px 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .back-link {
    font-size: 13px;
    font-weight: 400;
    color: rgba(255,255,255,0.35);
    text-decoration: none;
    letter-spacing: 0.01em;
    transition: color 0.2s;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .back-link:hover { color: rgba(255,255,255,0.65); }

  .counter {
    font-size: 12px;
    font-weight: 500;
    color: rgba(255,255,255,0.3);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  /* ── Progress dots ── */
  .progress-dots {
    display: flex;
    gap: 7px;
    align-items: center;
    flex-shrink: 0;
    margin: 6px 0 10px;
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: rgba(255,255,255,0.25);
    border: 1.5px solid rgba(255,255,255,0.25);
    transition: all 0.3s var(--spring);
  }
  .dot.active {
    background: white;
    border-color: white;
    transform: scale(1.2);
  }
  .dot.done {
    background: rgba(255,255,255,0.5);
    border-color: rgba(255,255,255,0.5);
  }

  /* ── Card stack area ── */
  .stack-area {
    flex: 1;
    width: 100%;
    max-width: 480px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 16px;
    min-height: 0;
  }

  /* ── Cards ── */
  .card {
    position: absolute;
    width: min(88vw, 420px);
    height: min(80vh, 600px);
    border-radius: var(--card-radius);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    cursor: grab;
    will-change: transform;
    transform-origin: center bottom;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6), 0 2px 8px rgba(0,0,0,0.4);
  }
  .card:active { cursor: grabbing; }

  .card.back-card {
    transform: scale(0.94) translateY(18px);
    cursor: default;
    pointer-events: none;
    z-index: 1;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }

  .card.front-card {
    z-index: 2;
  }

  .card-inner {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    padding: 22px 24px 24px;
    z-index: 1;
  }

  /* Subtle inner vignette */
  .card::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(255,255,255,0.06) 0%, transparent 70%),
                radial-gradient(ellipse at 50% 100%, rgba(0,0,0,0.3) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
    border-radius: var(--card-radius);
  }

  /* ── Card header ── */
  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .bio-pill {
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 100px;
    padding: 4px 11px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.75);
  }

  .header-dots {
    display: flex;
    gap: 4px;
  }
  .header-dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: rgba(255,255,255,0.25);
  }
  .header-dot.filled { background: rgba(255,255,255,0.75); }

  /* ── Person info ── */
  .person-info {
    margin-bottom: 18px;
  }

  .person-name {
    font-size: 15px;
    font-weight: 600;
    color: rgba(255,255,255,0.9);
    letter-spacing: 0.01em;
    margin-bottom: 3px;
  }

  .person-sub {
    font-size: 12px;
    font-weight: 400;
    color: rgba(255,255,255,0.45);
    letter-spacing: 0.03em;
    text-transform: uppercase;
  }

  /* ── Bio text area ── */
  .bio-text-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    background: rgba(0,0,0,0.18);
    padding: 20px;
    min-height: 0;
  }

  .bio-text {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(1.05rem, 3.5vw, 1.3rem);
    line-height: 1.55;
    color: rgba(255,255,255,0.92);
    text-align: center;
    position: relative;
  }

  .bio-text::before {
    content: '\201C';
    font-size: 2.5em;
    line-height: 0;
    vertical-align: -0.4em;
    color: rgba(255,255,255,0.12);
    margin-right: 0.05em;
    font-family: 'DM Serif Display', serif;
  }
  .bio-text::after {
    content: '\201D';
    font-size: 2.5em;
    line-height: 0;
    vertical-align: -0.4em;
    color: rgba(255,255,255,0.12);
    margin-left: 0.05em;
    font-family: 'DM Serif Display', serif;
  }

  /* ── Swipe overlays ── */
  .overlay {
    position: absolute;
    inset: 0;
    border-radius: var(--card-radius);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    z-index: 3;
    transition: opacity 0.1s;
  }

  .overlay-prefer {
    background: var(--prefer-color);
    backdrop-filter: blur(2px);
  }

  .overlay-skip {
    background: var(--skip-color);
    backdrop-filter: blur(2px);
  }

  .overlay-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: white;
    text-shadow: 0 2px 12px rgba(0,0,0,0.4);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  /* ── Action bar ── */
  .action-bar {
    flex-shrink: 0;
    width: 100%;
    max-width: 480px;
    padding: 12px 20px 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
  }

  .action-btn {
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    transition: transform 0.15s var(--spring), box-shadow 0.15s, opacity 0.2s;
    font-size: 22px;
    position: relative;
    -webkit-tap-highlight-color: transparent;
  }

  .action-btn:active { transform: scale(0.9) !important; }

  .btn-skip {
    width: 54px;
    height: 54px;
    background: rgba(200, 40, 60, 0.15);
    border: 1.5px solid rgba(200, 40, 60, 0.4);
    color: rgba(200, 40, 60, 0.9);
    box-shadow: 0 0 20px rgba(200, 40, 60, 0.15);
  }
  .btn-skip:hover {
    transform: scale(1.08);
    box-shadow: 0 0 28px rgba(200, 40, 60, 0.3);
  }

  .btn-equal {
    width: 62px;
    height: 62px;
    background: rgba(255,255,255,0.08);
    border: 1.5px solid rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.7);
    box-shadow: 0 0 20px rgba(255,255,255,0.05);
    font-size: 24px;
  }
  .btn-equal:hover {
    transform: scale(1.08);
    box-shadow: 0 0 28px rgba(255,255,255,0.12);
  }

  .btn-prefer {
    width: 54px;
    height: 54px;
    background: rgba(40, 200, 80, 0.15);
    border: 1.5px solid rgba(40, 200, 80, 0.4);
    color: rgba(40, 200, 80, 0.9);
    box-shadow: 0 0 20px rgba(40, 200, 80, 0.15);
  }
  .btn-prefer:hover {
    transform: scale(1.08);
    box-shadow: 0 0 28px rgba(40, 200, 80, 0.3);
  }

  /* ── Status toast ── */
  .toast {
    position: fixed;
    bottom: 110px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(30,30,40,0.9);
    border: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(20px);
    border-radius: 100px;
    padding: 10px 20px;
    font-size: 13px;
    font-weight: 500;
    color: rgba(255,255,255,0.85);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s, transform 0.25s var(--spring);
    z-index: 100;
    white-space: nowrap;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ── State label (BIO A on top / BIO B shown alone) ── */
  .state-hint {
    position: fixed;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    font-weight: 500;
    color: rgba(255,255,255,0.2);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 6px 12px;
    pointer-events: none;
    z-index: 10;
    opacity: 0;
    transition: opacity 0.3s;
  }

  /* ── Done screen ── */
  .done-screen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s;
    gap: 16px;
  }
  .done-screen.visible {
    opacity: 1;
    pointer-events: all;
  }

  .done-title {
    font-family: 'DM Serif Display', serif;
    font-size: 2.2rem;
    color: white;
    text-align: center;
    line-height: 1.2;
  }

  .done-subtitle {
    font-size: 15px;
    color: rgba(255,255,255,0.45);
    text-align: center;
    font-weight: 400;
  }

  .confetti-area {
    position: absolute;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
  }

  .confetti-piece {
    position: absolute;
    width: 8px;
    height: 8px;
    border-radius: 2px;
    animation: confetti-fall linear forwards;
  }

  @keyframes confetti-fall {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  .done-results {
    margin-top: 8px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    width: min(88vw, 360px);
  }

  .result-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 10px 16px;
    font-size: 13px;
  }
  .result-row .result-name { color: rgba(255,255,255,0.7); font-weight: 500; }
  .result-row .result-pref {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 100px;
  }
  .result-pref.prefer-a { background: rgba(40,200,80,0.2); color: rgba(40,200,80,0.9); }
  .result-pref.prefer-b { background: rgba(40,200,80,0.2); color: rgba(40,200,80,0.9); }
  .result-pref.equal { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.5); }
  .result-pref.skipped { background: rgba(200,40,60,0.15); color: rgba(200,40,60,0.7); }

  /* ── Animations ── */
  @keyframes fly-right {
    to { transform: translateX(150vw) rotate(25deg); opacity: 0; }
  }
  @keyframes fly-left {
    to { transform: translateX(-150vw) rotate(-25deg); opacity: 0; }
  }
  @keyframes slide-up {
    from { transform: scale(0.94) translateY(18px); }
    to   { transform: scale(1) translateY(0); }
  }

  .flying-right {
    animation: fly-right 0.42s cubic-bezier(0.4, 0, 0.8, 0.4) forwards !important;
    transition: none !important;
  }
  .flying-left {
    animation: fly-left 0.42s cubic-bezier(0.4, 0, 0.8, 0.4) forwards !important;
    transition: none !important;
  }
  .sliding-up {
    animation: slide-up 0.4s var(--spring) forwards;
  }

  /* Disable pointer events during animation */
  .animating { pointer-events: none; }
</style>
</head>
<body>

<div class="app" id="app">
  <div class="top-bar">
    <a href="#" class="back-link" onclick="return false">← back</a>
    <div class="progress-dots" id="progressDots"></div>
    <div class="counter" id="counter">0 labeled</div>
  </div>

  <div class="stack-area" id="stackArea"></div>

  <div class="action-bar">
    <button class="action-btn btn-skip" id="btnSkip" title="Skip / Next (←)">✕</button>
    <button class="action-btn btn-equal" id="btnEqual" title="Equal / No preference (=)">★</button>
    <button class="action-btn btn-prefer" id="btnPrefer" title="Prefer (→)">♥</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="done-screen" id="doneScreen">
  <div class="confetti-area" id="confettiArea"></div>
  <div class="done-title">All done!</div>
  <div class="done-subtitle" id="doneSubtitle"></div>
  <div class="done-results" id="doneResults"></div>
</div>

<script>
const PAIRS = [
  {
    person: { name: 'Jordan M.', age: 26, job: 'Software Engineer', city: 'NYC', initials: 'JM', color: 'linear-gradient(160deg, #1A1A2E, #16213E)' },
    a: 'I love hiking and cooking Italian food. I work in tech and spend my weekends exploring the city. Big music fan always looking for concert buddies. Looking for someone genuine who wants to build something real.',
    b: 'I write code that works on my machine (usually). I make pasta from scratch on Sundays because it\'s the only thing slower than my test suite. If your idea of a perfect night involves arguing whether Die Hard is a Christmas movie — we\'re going to get along great.'
  },
  {
    person: { name: 'Casey L.', age: 24, job: 'Kindergarten Teacher', city: 'Brooklyn', initials: 'CL', color: 'linear-gradient(160deg, #1A2E1A, #162116)' },
    a: 'I spend my days teaching 5-year-olds that sharing is caring, then immediately fail to share my fries. 47 plants, zero regrets. Currently on a Russian lit kick — which explains the vague existential expression.',
    b: 'Elementary teacher who loves reading and plants. I do yoga on weekends and love exploring coffee shops around Brooklyn. Looking for someone kind and adventurous to spend time with.'
  },
  {
    person: { name: 'Avery K.', age: 28, job: 'UX Designer', city: 'Manhattan', initials: 'AK', color: 'linear-gradient(160deg, #2E1A1A, #211616)' },
    a: 'I collect passport stamps and climbing calluses with equal enthusiasm. Shoot film because I like the commitment — you can\'t swipe left on a photo you\'ve already taken. Currently planning my 4th trip to Japan. Yes, I have a problem.',
    b: 'Love traveling and trying new foods. I design apps for work and enjoy rock climbing on weekends. Film photography is my creative outlet. Looking for someone to explore the city with.'
  },
  {
    person: { name: 'Sam R.', age: 30, job: 'Chef', city: 'Lower East Side', initials: 'SR', color: 'linear-gradient(160deg, #2E2A1A, #211E16)' },
    a: 'Professional chef who eats cereal for dinner at home. I spend 60 hours a week making food look beautiful and then can\'t be bothered. If you\'re a natural disaster in the kitchen too, we\'ll get along. My sourdough starter is named Gerald and he\'s doing great.',
    b: 'I\'m a chef who loves trying new restaurants and cuisines. Passionate about food and sustainability. Looking for someone who appreciates good conversation and great meals.'
  },
  {
    person: { name: 'Morgan P.', age: 27, job: 'Journalist', city: 'Midtown', initials: 'MP', color: 'linear-gradient(160deg, #1A1A2E, #2A1A2E)' },
    a: 'I write about things I barely understand, which is apparently journalism. Amateur competitive Scrabble player (yes, really). My book-to-read pile has achieved structural integrity at this point. Looking for someone who won\'t judge my annotated paperbacks.',
    b: 'Journalist passionate about storytelling. I love reading, board games, and good coffee. Looking for someone curious and kind who enjoys exploring the city and talking about ideas.'
  }
];

// ── State ──
let pairIndex = 0;         // which pair we're on
let showingBOnly = false;  // true = only bio B on screen (no back card)
let labeled = 0;
let results = [];
let busy = false;          // prevents double-firing

const stackArea = document.getElementById('stackArea');
const counter   = document.getElementById('counter');
const toast     = document.getElementById('toast');

// ── Progress dots ──
function renderDots() {
  const dots = document.getElementById('progressDots');
  dots.innerHTML = '';
  PAIRS.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === pairIndex ? ' active' : i < pairIndex ? ' done' : '');
    dots.appendChild(d);
  });
}

// ── Card builder ──
function makeCard(pair, bioLabel, isFront) {
  const p = pair.person;
  const text = bioLabel === 'A' ? pair.a : pair.b;

  const card = document.createElement('div');
  card.className = 'card ' + (isFront ? 'front-card' : 'back-card');
  card.style.background = p.color;

  // Header dots for visual texture
  const headerDotsFilled = isFront ? 2 : 1;
  const headerDotsHtml = [0,1,2].map(i =>
    `<div class="header-dot ${i < headerDotsFilled ? 'filled' : ''}"></div>`
  ).join('');

  card.innerHTML = `
    <div class="overlay overlay-prefer" id="overlay-prefer-${isFront ? 'front' : 'back'}">
      <div class="overlay-label">PREFER ✓</div>
    </div>
    <div class="overlay overlay-skip" id="overlay-skip-${isFront ? 'front' : 'back'}">
      <div class="overlay-label">NEXT →</div>
    </div>
    <div class="card-inner">
      <div class="card-header">
        <div class="bio-pill">Bio ${bioLabel}</div>
        <div class="header-dots">${headerDotsHtml}</div>
      </div>
      <div class="person-info">
        <div class="person-name">${p.name}, ${p.age}</div>
        <div class="person-sub">${p.job} · ${p.city}</div>
      </div>
      <div class="bio-text-wrap">
        <div class="bio-text">${text}</div>
      </div>
    </div>
  `;
  return card;
}

// ── Render pair ──
let frontCard = null;
let backCard  = null;

function renderPair() {
  stackArea.innerHTML = '';
  frontCard = null;
  backCard  = null;

  if (pairIndex >= PAIRS.length) {
    showDone();
    return;
  }

  renderDots();

  const pair = PAIRS[pairIndex];

  if (!showingBOnly) {
    // Bio B behind, Bio A in front
    backCard  = makeCard(pair, 'B', false);
    frontCard = makeCard(pair, 'A', true);
    stackArea.appendChild(backCard);
    stackArea.appendChild(frontCard);
    setupDrag(frontCard,
      () => handleSwipe('right-a'),  // prefer A
      () => handleSwipe('left-a')    // skip to B
    );
  } else {
    // Solo Bio B
    frontCard = makeCard(pair, 'B', true);
    stackArea.appendChild(frontCard);
    setupDrag(frontCard,
      () => handleSwipe('right-b'),  // prefer B
      () => handleSwipe('left-b')    // equal / no pref
    );
  }
}

// ── Drag physics ──
function setupDrag(cardEl, onRight, onLeft) {
  let startX = 0, currentX = 0, dragging = false;
  const THRESHOLD = 80;

  const overlayPrefer = cardEl.querySelector('.overlay-prefer');
  const overlaySkip   = cardEl.querySelector('.overlay-skip');

  function start(x) {
    if (busy) return;
    startX = x;
    dragging = true;
    currentX = 0;
    cardEl.style.transition = 'none';
  }

  function move(x) {
    if (!dragging) return;
    currentX = x - startX;
    const rot = currentX * 0.045;
    cardEl.style.transform = `translateX(${currentX}px) rotate(${rot}deg)`;

    // Overlay opacity
    const pct = Math.abs(currentX) / THRESHOLD;
    if (currentX > 20) {
      overlayPrefer.style.opacity = Math.min(pct * 0.9, 0.92);
      overlaySkip.style.opacity   = 0;
    } else if (currentX < -20) {
      overlaySkip.style.opacity   = Math.min(pct * 0.9, 0.92);
      overlayPrefer.style.opacity = 0;
    } else {
      overlayPrefer.style.opacity = 0;
      overlaySkip.style.opacity   = 0;
    }

    // Back card parallax: lift as front is dragged
    if (backCard) {
      const lift = Math.min(Math.abs(currentX) / THRESHOLD, 1);
      const scale = 0.94 + lift * 0.06;
      const ty    = 18 - lift * 18;
      backCard.style.transform = `scale(${scale}) translateY(${ty}px)`;
    }
  }

  function end() {
    if (!dragging) return;
    dragging = false;

    if (busy) return;

    overlayPrefer.style.opacity = 0;
    overlaySkip.style.opacity   = 0;

    if (backCard) {
      backCard.style.transform = '';
      backCard.style.transition = 'transform 0.35s var(--spring)';
    }

    if (currentX > THRESHOLD) {
      flyOff(cardEl, 'right', onRight);
    } else if (currentX < -THRESHOLD) {
      flyOff(cardEl, 'left', onLeft);
    } else {
      // Spring back
      cardEl.style.transition = 'transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1)';
      cardEl.style.transform = '';
    }
  }

  // Mouse
  cardEl.addEventListener('mousedown', e => { e.preventDefault(); start(e.clientX); });
  // Touch
  cardEl.addEventListener('touchstart', e => start(e.touches[0].clientX), { passive: true });
  // Global move / end
  function onMouseMove(e) { move(e.clientX); }
  function onTouchMove(e) { move(e.touches[0].clientX); }
  function onMouseUp()  { end(); cleanup(); }
  function onTouchEnd() { end(); cleanup(); }

  function cleanup() {
    document.removeEventListener('mousemove', onMouseMove);
    document.removeEventListener('touchmove', onTouchMove);
    document.removeEventListener('mouseup', onMouseUp);
    document.removeEventListener('touchend', onTouchEnd);
  }

  // Re-attach each drag start
  cardEl.addEventListener('mousedown', () => {
    document.addEventListener('mousemove', onMouseMove);
    document.addEventListener('mouseup',   onMouseUp);
  });
  cardEl.addEventListener('touchstart', () => {
    document.addEventListener('touchmove', onTouchMove, { passive: true });
    document.addEventListener('touchend',  onTouchEnd);
  }, { passive: true });
}

function flyOff(cardEl, dir, callback) {
  busy = true;
  cardEl.classList.add('animating');
  cardEl.style.transition = 'none';
  cardEl.classList.add(dir === 'right' ? 'flying-right' : 'flying-left');
  cardEl.addEventListener('animationend', () => {
    busy = false;
    callback();
  }, { once: true });
}

// ── Swipe handlers ──
function handleSwipe(action) {
  const pair = PAIRS[pairIndex];

  if (action === 'right-a') {
    // Prefer A
    results.push({ pair: pairIndex, pref: 'A', name: pair.person.name });
    labeled++;
    updateCounter();
    showToast(`Preferred Bio A for ${pair.person.name}`);
    pairIndex++;
    showingBOnly = false;
    setTimeout(renderPair, 80);

  } else if (action === 'left-a') {
    // Skip to B — don't record yet
    showingBOnly = true;
    // Animate back card sliding up, then re-render solo
    if (backCard) {
      backCard.classList.add('animating', 'sliding-up');
      backCard.style.transform = '';
      backCard.addEventListener('animationend', () => {
        renderPair();
      }, { once: true });
    } else {
      renderPair();
    }

  } else if (action === 'right-b') {
    // Prefer B
    results.push({ pair: pairIndex, pref: 'B', name: pair.person.name });
    labeled++;
    updateCounter();
    showToast(`Preferred Bio B for ${pair.person.name}`);
    pairIndex++;
    showingBOnly = false;
    setTimeout(renderPair, 80);

  } else if (action === 'left-b') {
    // Equal / no preference
    results.push({ pair: pairIndex, pref: 'equal', name: pair.person.name });
    labeled++;
    updateCounter();
    showToast(`No preference for ${pair.person.name}`);
    pairIndex++;
    showingBOnly = false;
    setTimeout(renderPair, 80);
  }
}

function updateCounter() {
  counter.textContent = `${labeled} labeled`;
}

// ── Toast ──
let toastTimer = null;
function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 1800);
}

// ── Action buttons ──
document.getElementById('btnSkip').addEventListener('click', () => {
  if (busy) return;
  triggerSwipeLeft();
});
document.getElementById('btnPrefer').addEventListener('click', () => {
  if (busy) return;
  triggerSwipeRight();
});
document.getElementById('btnEqual').addEventListener('click', () => {
  if (busy) return;
  if (pairIndex >= PAIRS.length) return;
  if (!showingBOnly) {
    // Equal from B-A view: just record equal
    triggerEqual();
  } else {
    triggerEqual();
  }
});

function triggerSwipeRight() {
  if (!frontCard || busy) return;
  flyOff(frontCard, 'right', () => {
    if (!showingBOnly) handleSwipe('right-a');
    else handleSwipe('right-b');
  });
}

function triggerSwipeLeft() {
  if (!frontCard || busy) return;
  flyOff(frontCard, 'left', () => {
    if (!showingBOnly) handleSwipe('left-a');
    else handleSwipe('left-b');
  });
}

function triggerEqual() {
  // Equal: fly off left from whatever state
  if (!frontCard || busy) return;
  if (showingBOnly) {
    flyOff(frontCard, 'left', () => handleSwipe('left-b'));
  } else {
    // From A+B view: record equal and advance
    flyOff(frontCard, 'left', () => {
      const pair = PAIRS[pairIndex];
      results.push({ pair: pairIndex, pref: 'equal', name: pair.person.name });
      labeled++;
      updateCounter();
      showToast(`No preference for ${pair.person.name}`);
      pairIndex++;
      showingBOnly = false;
      setTimeout(renderPair, 80);
    });
  }
}

// ── Keyboard ──
document.addEventListener('keydown', e => {
  if (pairIndex >= PAIRS.length) return;
  if (e.key === 'ArrowRight') { e.preventDefault(); triggerSwipeRight(); }
  if (e.key === 'ArrowLeft')  { e.preventDefault(); triggerSwipeLeft();  }
  if (e.key === '=')           { e.preventDefault(); triggerEqual();      }
});

// ── Done screen ──
function showDone() {
  renderDots();
  const done = document.getElementById('doneScreen');
  document.getElementById('doneSubtitle').textContent =
    `${labeled} preference${labeled !== 1 ? 's' : ''} collected`;

  // Results list
  const ul = document.getElementById('doneResults');
  ul.innerHTML = '';
  results.forEach(r => {
    const row = document.createElement('div');
    row.className = 'result-row';
    const prefLabel = r.pref === 'A' ? 'Bio A' : r.pref === 'B' ? 'Bio B' : 'Equal';
    const prefClass = r.pref === 'A' ? 'prefer-a' : r.pref === 'B' ? 'prefer-b' : 'equal';
    row.innerHTML = `
      <span class="result-name">${r.name}</span>
      <span class="result-pref ${prefClass}">${prefLabel}</span>
    `;
    ul.appendChild(row);
  });

  done.classList.add('visible');
  spawnConfetti();
}

function spawnConfetti() {
  const area = document.getElementById('confettiArea');
  const colors = ['#28C850','#E89923','#0577B1','#993399','#C84E00','#A1B70D','#339898'];
  for (let i = 0; i < 60; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.cssText = `
      left: ${Math.random() * 100}vw;
      top: -10px;
      background: ${colors[Math.floor(Math.random() * colors.length)]};
      width: ${4 + Math.random() * 6}px;
      height: ${4 + Math.random() * 6}px;
      border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
      animation-duration: ${1.5 + Math.random() * 2.5}s;
      animation-delay: ${Math.random() * 1.2}s;
      opacity: 0.85;
    `;
    area.appendChild(piece);
  }
}

// ── Init ──
renderDots();
renderPair();
</script>
